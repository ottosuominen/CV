        :root {

        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #0b1120;
            color: var(--text);

        .app-shell {

            width: 100%;
            min-height: 100vh;
            background: #0b1120;
        }

        #map {
            width: 100%;
            height: 100vh;
            min-height: 100vh;
            background: #0b1120;
        }

        .map-brand {
            position: absolute;
            left: 16px;
            bottom: 24px;
            z-index: 500;
            display: flex;
            align-items: center;
            min-height: 36px;

            font-weight: 700;
            letter-spacing: 0;
            box-shadow: var(--shadow);
            backdrop-filter: blur(14px);
            pointer-events: none;
        }

            content: "";
            width: 8px;
            height: 8px;
            margin-right: 8px;
            border-radius: 999px;
            background: var(--accent);
            box-shadow: 0 0 0 4px rgba(20, 184, 166, 0.2);

            font: inherit;
            background: #0b1120;

            margin-bottom: 16px;

            background: var(--panel-bg-light) !important;
            box-shadow: var(--shadow) !important;
            backdrop-filter: blur(14px);
        }

            overflow: hidden;

            height: var(--control-size) !important;

            background: rgba(20, 184, 166, 0.14) !important;

            display: block !important;

        .leaflet-control-search .search-cancel {
            position: relative;
            width: var(--control-size) !important;
            height: var(--control-size) !important;
            margin: 0 !important;
            border-radius: 6px;
            background-image: none !important;
            background-position: 50% 50% !important;
            background-repeat: no-repeat !important;

            position: absolute;
            inset: 0;
            display: grid;
            place-items: center;

            font-size: 24px;
            font-weight: normal;
            line-height: var(--control-size);
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
            font-feature-settings: 'liga';

        .leaflet-control-search .search-button::before {
            content: "search";

        .leaflet-control-search .search-cancel::before {
            content: "close";
            font-size: 20px;
        }

        .leaflet-control-layers {
            position: relative;
            width: var(--control-size);
            min-width: var(--control-size);
            height: var(--control-size);
            min-height: var(--control-size);
            overflow: visible;
            color: #e2e8f0;
            background: #ffffff !important;
            transition: background-color 160ms ease, color 160ms ease;
        }

        .leaflet-control-layers::before {
            content: "";
            position: absolute;
            inset: 0;
            z-index: 2;
            border-radius: 6px;
            background: url('settings_FILL1_wght400_GRAD0_opsz24.svg') no-repeat center center;
            background-size: 26px 26px;
            pointer-events: none;
            transition: background-color 160ms ease, transform 160ms ease;
        }

        .leaflet-control-layers:hover,

        .leaflet-control-layers.is-open {
            background: rgba(20, 184, 166, 0.94) !important;
        }

        .leaflet-control-layers:focus-within::before,
        .leaflet-control-layers.is-open::before {
            transform: rotate(30deg);
        }

        .leaflet-control-layers-list {
            position: fixed !important;
            top: calc(16px + var(--control-size) + 8px) !important;
            right: 16px !important;
            left: auto !important;

            transform: translateY(-4px) scale(0.98);

            transition: opacity 140ms ease, transform 140ms ease, visibility 140ms ease;
            visibility: hidden;

            transform: translateY(0) scale(1);
            visibility: visible;

            padding: 0 !important;

        .leaflet-control-layers-toggle {
            display: none !important;

        .leaflet-control-layers-base,

            display: grid;
            gap: 6px;

        }

        .marker-cluster-small div,

        }

        .material-icons {
            font-family: 'Material Icons';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
            -moz-osx-font-smoothing: grayscale;
            font-feature-settings: 'liga';
        }

        .md-24 { font-size: 24px; }
        .md-dark { color: rgba(0, 0, 0, 0.54); }
        .md-dark.md-inactive { color: rgba(0, 0, 0, 0.26); }
        .md-light { color: rgba(255, 255, 255, 1); }
        .md-light.md-inactive { color: rgba(255, 255, 255, 0.3); }

        @media (max-width: 640px) {

                width: min(210px, calc(100vw - 86px));

            border-radius: var(--radius);
            background: var(--panel-bg-light);
            box-shadow: var(--shadow);
            backdrop-filter: blur(14px);
            transition: width 160ms ease;
        }

        .kp-search.is-open {
            width: min(340px, calc(100vw - 32px));
        }

        .kp-search__input {
            display: none;
            flex: 1 1 auto;
            min-width: 0;
            height: 32px;
            margin-left: 5px;
            padding: 0 10px;
            border: 1px solid rgba(148, 163, 184, 0.46);
            border-radius: 6px;
            outline: none;
            color: var(--text);
            font: inherit;
            font-size: 14px;
        }

        .kp-search.is-open .kp-search__input {
            display: block;
        }

        .kp-search__button,
        .kp-search__clear {
            position: relative;
            display: grid;
            place-items: center;
            flex: 0 0 var(--control-size);
            width: var(--control-size);
            height: var(--control-size);
            padding: 0;
            border: 0;
            background: transparent;
            color: var(--text);
            cursor: pointer;
        }

        .kp-search__clear {
            display: none;
            flex-basis: 34px;
            width: 34px;
        }

        .kp-search.is-open .kp-search__clear {
            display: grid;
        }

        .kp-search__button .material-icons,
        .kp-search__clear .material-icons {
            font-size: 26px;
        }

        .kp-search__clear .material-icons {
            font-size: 22px;
        }

        .kp-search__input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(20, 184, 166, 0.18);
        }

        .kp-search__input.is-error {
            border-color: #ef4444;
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.16);
        }

        @media (max-width: 640px) {
            .kp-search.is-open {
                width: min(320px, calc(100vw - 20px));
            }
        }
    </style>


</head>
<body>
  <main class="app-shell" aria-label="Radiosuunnitelman kartta">
    <div id="map"></div>
  </main>
    <script>

        // globaalin muuttujan tulostus
        console.log("Geojson data:",geojsonData);

    var osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            minZoom: 8,
            maxZoom: 19,
            noWrap: true,
            chunkedLoading: true,
            attribution: '&copy; <a href="https://openstreetmap.org">OpenStreetMap</a> contributors'
        });

        var map = new L.Map('map', { layers: [osmLayer] }).setView(new L.LatLng(61, 22.5), 6);

        var layerOsm = new L.TileLayer('https://{s}.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}', {
            subdomains: ['server', 'services'],
            minZoom: 8,
            maxZoom: 19,
            noWrap: true,
            chunkedLoading: true,
            attribution: '<a href="https://www.arcgis.com/">ArcGIS</a>'
        });

        var layerOrtho = new L.TileLayer('https://server.arcgisonline.com/arcgis/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            subdomains: ['server', 'services'],
            minZoom: 8,
            maxZoom: 18,
            noWrap: true,
            chunkedLoading: true,
            attribution: '<a href="https://www.arcgis.com/">ArcGIS</a>'
        });

        // Google Maps -kerrokset
        var googleStreets = L.tileLayer('https://{s}.google.com/vt?lyrs=m&x={x}&y={y}&z={z}',{
            maxZoom: 20,
            chunkedLoading: true,
            noWrap: true,
            subdomains:['mt0','mt1','mt2','mt3']
        });

        var googleHybrid = L.tileLayer('https://{s}.google.com/vt?lyrs=s,h&x={x}&y={y}&z={z}',{
            maxZoom: 20,
            chunkedLoading: true,
            noWrap: true,
            subdomains:['mt0','mt1','mt2','mt3']
        });

        var googleSat = L.tileLayer('https://{s}.google.com/vt?lyrs=s&x={x}&y={y}&z={z}',{
            maxZoom: 20,
            chunkedLoading: true,
            noWrap: true,
            subdomains:['mt0','mt1','mt2','mt3']
        });

        // Luo karttatasojen hallintapainike
        var baseLayers = {
            "OpenStreet Streets": osmLayer,
            "ArcGIS Terrain": layerOsm,
            "Google Streets": googleStreets,
            "Google Satellite": googleSat,
            "Google Hybrid": googleHybrid
        };

        function isOrthoLayerActive() {
            return map.hasLayer(googleSat) || map.hasLayer(googleHybrid) || map.hasLayer(layerOrtho);
        }

        function getCustomIconP2P() {
            var color = isOrthoLayerActive() ? '#FFFFFF' : '#808080'; // Valkoinen, jos ortokuva on käytössä, muuten harmaa
            return new L.divIcon({
                className: 'custom-icon',
                html: '<span class="material-icons md-24" style="color: ' + color + '; opacity: 0.85; filter: drop-shadow(2px 2px 4px rgba(0, 0, 0, 0.15));">location_pin</span>',
                iconSize: [24, 24]
            });
        }

        function getCustomIcon(color) {      
            return new L.divIcon({       
                className: 'custom-icon',         
                html: '<span class="material-icons md-24" style="color: ' + color + '; opacity: 0.85; filter: drop-shadow(2px 2px 4px rgba(0, 0, 0, 0.15));">location_pin</span>',          
                iconSize: [24, 24]         
            });         
        }

        function findOverlappingMarkers(latlng) {
            var overlappingMarkers = [];
            var seenMarkers = {};
            var allLayers = Array.prototype.slice.call(arguments, 1);

            function collectMarkers(layer) {
                if (!layer) {
                    return;
                }

                if (layer instanceof L.Marker && layer.getLatLng().equals(latlng)) {
                    var markerId = L.Util.stamp(layer);
                    if (!seenMarkers[markerId]) {
                        seenMarkers[markerId] = true;
                        overlappingMarkers.push(layer);
                    }
                    return;
                }

                if (layer.eachLayer) {
                    layer.eachLayer(collectMarkers);
                }
            }

            allLayers.forEach(function(layer) {
                collectMarkers(layer);
            });

            return overlappingMarkers;
        }

        // Määritellään globaalit muuttujat popup-toiminnallisuutta varten
        var openPopupTimeout;
        var canOpenPopup = true;

        // Funktio kerrosten luomiseen
        function createLayer(geoJsonData, layerName, clusterOptions = null) {
            // Suodata data tyypin mukaan
            var filteredData = {
                type: "FeatureCollection",
                features: geoJsonData.features.filter(function(feature) {
                    return feature.properties.Tyyppi === layerName;
                })
            };
            
            // Luo kerros
            var layer = L.geoJSON(filteredData, {
                onEachFeature: function (feature, layer) {
                    var markerColor = feature.properties['marker-color'];
                    var customIcon = layerName === 'P2P' ? getCustomIconP2P() : getCustomIcon(markerColor);
                    layer.setIcon(customIcon);
                    
                    layer.on('mouseover', function (e) {
                        clearTimeout(openPopupTimeout);
                        openPopupTimeout = setTimeout(function () {
                            if (canOpenPopup) {
                                var popupContent = "";
                                for (var key in feature.properties) {
                                    if (key !== 'marker-color' && feature.properties.hasOwnProperty(key)) {
                                        popupContent += key + ": " + feature.properties[key] + "<br>";
                                    }
                                }
                                if (popupContent !== "") {
                                    layer.bindPopup(popupContent, {
                                        className: 'custom-popup',
                                        popupAnchor: [-100, -100],
                                        autoPan: false,
                                    }).openPopup();
                                }
                            }
                        }, 900);
                    });

                    layer.on('mouseout', function (e) {
                        clearTimeout(openPopupTimeout);

                        // Tarkista, siirtyykö hiiri popupin sisälle - jos siirtyy, ei suljeta popupia
                        var related = e.originalEvent && e.originalEvent.relatedTarget;
                        if (related && related.closest && related.closest('.leaflet-popup')) {
                            return;
                        }

                        canOpenPopup = false;
                        layer.closePopup();
                    });

                    layer.on('mousemove', function () {
                        canOpenPopup = true;
                    });

                    // Kun popup avataan, kuuntele myös sen oman elementin mouseleave-tapahtumaa
                    layer.on('popupopen', function (e) {
                        var popupEl = e.popup.getElement();
                        if (popupEl) {
                            L.DomEvent.on(popupEl, 'mouseleave', function () {
                                canOpenPopup = false;
                                layer.closePopup();
                            });
                        }
                    });
                }
            });

            // Lisää klusterointi jos annettu
            if (clusterOptions) {
                var cluster = L.markerClusterGroup(clusterOptions);
                cluster.addLayer(layer);
                return cluster;
            }
            
            return layer;
        }

        // Luo kerrokset uudella funktiolla
        var slavetLayer = createLayer(geojsonData, 'DynamicSlave', {
            chunkedLoading: true,
            showCoverageOnHover: true,
            spiderfyOnMaxZoom: false,
            disableClusteringAtZoom: 16
        });

        var ctLayer = createLayer(geojsonData, 'CT');
        var vtLayer = createLayer(geojsonData, 'VT');
        var masteritLayer = createLayer(geojsonData, 'DynamicMaster');
        

        // Luo markerCluste slaveille ryhmä
        var markerCluster = L.markerClusterGroup({
            chunkedLoading: true,
            showCoverageOnHover: true,
            spiderfyOnMaxZoom: false,
            disableClusteringAtZoom: 16
        });
        markerCluster.addLayer(slavetLayer);

        // Luo markerCluster p2p ryhmä
        var p2pCluster = createLayer(geojsonData, 'P2P', {
            chunkedLoading: true,
            showCoverageOnHover: true,
            spiderfyOnMaxZoom: false,
            disableClusteringAtZoom: 16  // Yhdenmukainen zoom-taso
        });

        // Lisää kerrokset karttaan
        map.addLayer(markerCluster);
        map.addLayer(ctLayer);
        map.addLayer(vtLayer);
        map.addLayer(masteritLayer);
        map.addLayer(p2pCluster);

        var overlayLayers = {
            "SLAVE": markerCluster,
            "MASTER": masteritLayer,
            "P2P": p2pCluster,
            "CT": ctLayer,
            "VT": vtLayer
        };

        // Luo karttatasojen hallintapainike ja lisää se ylös oikealle                
        var layerControl = L.control.layers(baseLayers, overlayLayers, {
            collapsed: false, position: 'topright' }).addTo(map);

        var layerControlElement = layerControl.getContainer();
        var layerControlList = layerControlElement.querySelector('.leaflet-control-layers-list');
        var layerControlCloseTimeout;

        function openLayerControlMenu() {
            clearTimeout(layerControlCloseTimeout);
            layerControlElement.classList.add('is-open');
        }

        function closeLayerControlMenu() {
            layerControlCloseTimeout = setTimeout(function() {
                if (!layerControlElement.matches(':hover') && (!layerControlList || !layerControlList.matches(':hover'))) {
                    layerControlElement.classList.remove('is-open');
                }
            }, 180);
        }

        L.DomEvent.on(layerControlElement, 'mouseenter', openLayerControlMenu);
        L.DomEvent.on(layerControlElement, 'mouseleave', closeLayerControlMenu);

        if (layerControlList) {
            L.DomEvent.on(layerControlList, 'mouseenter', openLayerControlMenu);
            L.DomEvent.on(layerControlList, 'mouseleave', closeLayerControlMenu);
        }

        L.DomEvent.on(layerControlElement, 'click', function(e) {
            if (e.target.closest && e.target.closest('label')) {
                return;
            }

            L.DomEvent.stop(e);
            if (layerControlElement.classList.contains('is-open')) {
                layerControlElement.classList.remove('is-open');
            } else {
                openLayerControlMenu();
            }
        });

        L.DomEvent.on(document, 'click', function(e) {
            if (!layerControlElement.contains(e.target)) {
                layerControlElement.classList.remove('is-open');
            }
        });

        L.DomEvent.on(document, 'keydown', function(e) {
            if (e.key === 'Escape') {
                layerControlElement.classList.remove('is-open');
            }
        });

        // Tarkista ortokuvan käyttö ja päivitä P2P-kuvakkeet baselayerin vaihdon yhteydessä
        map.on('baselayerchange', function() {
            p2pCluster.eachLayer(function(layer) {
                layer.setIcon(getCustomIconP2P());
            });
        });

        var searchableLayers = [markerCluster, p2pCluster, ctLayer, vtLayer, masteritLayer];

        function findMarkerByKP(query) {
            var normalizedQuery = String(query || "").trim().toLowerCase();
            var exactMarker = null;
            var partialMarker = null;

            if (!normalizedQuery) {
                return null;
            }

            function inspectLayer(layer) {
                if (!layer || exactMarker) {
                    return;
                }

                if (layer instanceof L.Marker && layer.feature && layer.feature.properties) {
                    var kp = layer.feature.properties.KP;
                    if (kp !== undefined && kp !== null) {
                        var normalizedKP = String(kp).trim().toLowerCase();
                        if (normalizedKP === normalizedQuery) {
                            exactMarker = layer;
                            return;
                        }

                        if (!partialMarker && normalizedKP.indexOf(normalizedQuery) !== -1) {
                            partialMarker = layer;
                        }
                    }
                    return;
                }

                if (layer.eachLayer) {
                    layer.eachLayer(inspectLayer);
                }
            }

            searchableLayers.forEach(inspectLayer);
            return exactMarker || partialMarker;
        }

        function openMarkerSearchPopup(marker) {
            map.setView(marker.getLatLng(), 17, { animate: true });
            setTimeout(function() {
                var overlappingMarkers = findOverlappingMarkers(marker.getLatLng(), markerCluster, p2pCluster, ctLayer, vtLayer, masteritLayer);
                var popupContent = "";
                overlappingMarkers.forEach(function (overlappingMarker) {
                    var contentPart = "";
                    for (var key in overlappingMarker.feature.properties) {
                        if (key !== 'marker-color' && overlappingMarker.feature.properties.hasOwnProperty(key)) {
                            var text = key + ": " + overlappingMarker.feature.properties[key];
                            if (overlappingMarker === marker) {
                                contentPart += '<span class="target-text">' + text + '</span><br>';
                            } else {
                                contentPart += text + "<br>";
                            }
                        }
                    }
                    popupContent += contentPart + "<hr>";
                });
                if (popupContent !== "") {
                    var popup = marker.bindPopup(popupContent, {
                        className: 'custom-popup',
                        popupAnchor: [-100, -100],
                        autoPan: false,
                    });
                    popup.on('popupopen', function() {
                        var targetElement = document.querySelector('.target-text');
                        if (targetElement) {
                            targetElement.scrollIntoView({ behavior: "smooth", block: "nearest" });
                        }
                    });
                    marker.openPopup();
                }
            }, 300);
        }

        var kpSearchControl = L.control({ position: 'topleft' });
        kpSearchControl.onAdd = function() {
            var container = L.DomUtil.create('div', 'kp-search leaflet-control');
            var input = L.DomUtil.create('input', 'kp-search__input', container);
            var clearButton = L.DomUtil.create('button', 'kp-search__clear', container);
            var searchButton = L.DomUtil.create('button', 'kp-search__button', container);
            // UUSI: Luodaan laatikko ehdotuksille
            var suggestionsBox = L.DomUtil.create('div', 'kp-search__suggestions', container);

            input.type = 'search';
            input.placeholder = 'Hae KP...';
            input.autocomplete = 'off';
            clearButton.type = 'button';
            clearButton.title = 'Tyhjennä haku';
            clearButton.innerHTML = '<span class="material-icons">close</span>';
            searchButton.type = 'button';
            searchButton.title = 'Hae KP';
            searchButton.innerHTML = '<span class="material-icons">search</span>';

            L.DomEvent.disableClickPropagation(container);
            L.DomEvent.disableScrollPropagation(container);

            function openSearch() {
                container.classList.add('is-open');
                setTimeout(function() {
                    input.focus();
                }, 0);
            }

            function closeSearch() {
                input.value = '';
                input.classList.remove('is-error');
                hideSuggestions();
                container.classList.remove('is-open');
            }

            function runSearch() {
                if (!container.classList.contains('is-open')) {
                    openSearch();
                    return;
                }

                var marker = findMarkerByKP(input.value);
                if (!marker) {
                    input.classList.add('is-error');
                    return;
                }

                input.classList.remove('is-error');
                hideSuggestions();
                openMarkerSearchPopup(marker);
            }

            function hideSuggestions() {
                suggestionsBox.innerHTML = '';
                suggestionsBox.classList.remove('has-results');
            }

            // Etsitään KP-ehdotukset samoista kerroksista kuin varsinainen KP-haku.
            // Tämä käy myös klusterien ja GeoJSON-ryhmien sisäiset markerit läpi.
            function updateSuggestions() {
                hideSuggestions();

                var query = input.value.trim().toLowerCase();
                if (query.length < 1) {
                    return;
                }

                var matches = [];
                var seenKPs = new Set();

                function inspectLayerForSuggestions(layer) {
                    if (!layer) {
                        return;
                    }

                    if (layer instanceof L.Marker && layer.feature && layer.feature.properties) {
                        var kp = layer.feature.properties.KP;

                        if (kp !== undefined && kp !== null) {
                            var kpStr = String(kp).trim();
                            var normalizedKP = kpStr.toLowerCase();

                            if (normalizedKP.indexOf(query) !== -1 && !seenKPs.has(kpStr)) {
                                seenKPs.add(kpStr);
                                matches.push({
                                    kp: kpStr,
                                    marker: layer
                                });
                            }
                        }

                        return;
                    }

                    if (layer.eachLayer) {
                        layer.eachLayer(inspectLayerForSuggestions);
                    }
                }

                searchableLayers.forEach(inspectLayerForSuggestions);

                matches.slice(0, 10).forEach(function(item) {
                    var div = L.DomUtil.create('div', 'kp-search__suggestion-item', suggestionsBox);
                    div.textContent = item.kp;

                    L.DomEvent.on(div, 'mousedown', function(e) {
                        L.DomEvent.stop(e);
                        input.value = item.kp;
                        input.classList.remove('is-error');
                        hideSuggestions();
                        openMarkerSearchPopup(item.marker);
                    });
                });

                if (matches.length > 0) {
                    suggestionsBox.classList.add('has-results');
                }
            }

            L.DomEvent.on(searchButton, 'click', runSearch);
            L.DomEvent.on(clearButton, 'click', closeSearch);
            
            // PÄIVITETTY: Kuunnellaan kirjoitusta ja päivitetään ehdotukset lennosta
            L.DomEvent.on(input, 'input', function() {
                input.classList.remove('is-error');
                updateSuggestions();
            });
            
            L.DomEvent.on(input, 'keydown', function(e) {
                if (e.key === 'Enter') {
                    runSearch();
                }
                if (e.key === 'Escape') {
                    closeSearch();
                }
            });

            // Suljetaan ehdotuslista, jos klikataan muualle kartalla
            map.on('click', function() {
                hideSuggestions();
            });

            return container;
        };
        kpSearchControl.addTo(map);

        // Piirtotyökalu                  
        var featureGroup = L.featureGroup().addTo(map);                 
        var drawControl = new L.Control.Draw({                      
            draw: {                     
                polyline: {                             
                    shapeOptions: {                                  
                        color: '#3388ff', // väri                                    
                        weight: 5 // Linjan paksuus                             
                    },                          
                    icon: new L.DivIcon({ // Logo                                      
                        className: 'custom-icon', // Googlen custom icon luokka css kansiosta                             
                        html: '<span class="material-icons md-24" style="color: green;">location_pin</span>',                                     
                        iconSize: [24, 24]                                  
                    })                              
                },                               
                polygon: false,                               
                rectangle: false,              
                circle: false,                 
                marker: false,                  
                circlemarker: false             
            }              
        });                 
        drawControl.addTo(map);

        L.StreetView = L.Control.extend({
            options: {
            google: true, // Pelkästään google käyttöön, napit poistuu samalla muista
            bing: false,
            yandex: false,
            mapillary: false,
            mapillaryId: null,
            openstreetcam: false,
            mosatlas: false
            },

            providers: [
            ['google', 'GSV', 'Avaa katunäkymän haetulla KP:lla', false,
                'https://www.google.com/maps?layer=c&cbll={lat},{lon}'],
            ['bing', 'Bing', 'Bing StreetSide',
                L.latLngBounds([[25, -168], [71.4, 8.8]]),
                'https://www.bing.com/maps?cp={lat}~{lon}&lvl=19&style=x&v=2'],
            ['yandex', 'ЯП', 'Yandex Panoramas',
                L.latLngBounds([[35.6, 18.5], [72, 180]]),
                'https://yandex.ru/maps/?panorama%5Bpoint%5D={lon},{lat}'],
            ['mapillary', 'Mplr', 'Mapillary Photos', false,
                'https://a.mapillary.com/v3/images?client_id={id}&closeto={lon},{lat}&lookat={lon},{lat}'],
            ['openstreetcam', 'OSC', 'OpenStreetCam', false,
                'lat={lat}&lng={lon}&distance=50'],
            ['mosatlas', 'Мос', 'Панорамы из Атласа Москвы',
                L.latLngBounds([[55.113, 36.708], [56.041, 38]]),
                'http://atlas.mos.ru/?lang=ru&z=9&ll={lon}%2C{lat}&pp={lon}%2C{lat}'],
            ],

            onAdd: function(map) {
            this._container = L.DomUtil.create('div', 'leaflet-bar');
            this._buttons = [];

            for (var i = 0; i < this.providers.length; i++)
                this._addProvider(this.providers[i]);

            map.on('moveend', function() {
                if (!this._fixed)
                this._update(map.getCenter());
            }, this);
            this._update(map.getCenter());
            return this._container;
            },

            fixCoord: function(latlon) {
            this._update(latlon);
            this._fixed = true;
            },

            releaseCoord: function() {
            this._fixed = false;
            this._update(this._map.getCenter());
            },

            _addProvider: function(provider) {
            if (!this.options[provider[0]])
                return;
            if (provider[0] == 'mapillary' && !this.options.mapillaryId)
                return;
            var button = L.DomUtil.create('a');
            button.innerHTML = provider[1];
            button.title = provider[2];
            button._bounds = provider[3];
            button._template = provider[4];
            button.href = '#';
            button.target = 'streetview';
            button.style.padding = '0';
            button.style.width = 'var(--control-size)';
            button.style.height = 'var(--control-size)';
            button.style.lineHeight = 'var(--control-size)';

            // Some buttons require complex logic
            if (provider[0] == 'mapillary') {
                button._needUrl = false;
                L.DomEvent.on(button, 'click', function(e) {
                if (button._href) {
                    this._ajaxRequest(
                    button._href.replace(/{id}/, this.options.mapillaryId),
                    function(data) {
                        if (data && data.features && data.features[0].properties) {
                        var photoKey = data.features[0].properties.key,
                            url = 'https://www.mapillary.com/map/im/{key}'.replace(/{key}/, photoKey);
                        window.open(url, button.target);
                        }
                    }
                    );
                }
                return L.DomEvent.preventDefault(e);
                }, this);
            } else if (provider[0] == 'openstreetcam') {
                button._needUrl = false;
                L.DomEvent.on(button, 'click', function(e) {
                if (button._href) {
                    this._ajaxRequest(
                    'http://openstreetcam.org/nearby-tracks',
                    function(data) {
                        if (data && data.osv && data.osv.sequences) {
                        var seq = data.osv.sequences[0],
                            url = 'https://www.openstreetcam.org/details/'+seq.sequence_id+'/'+seq.sequence_index;
                        window.open(url, button.target);
                        }
                    },
                    button._href
                    );
                }
                return L.DomEvent.preventDefault(e);
                }, this);
            } else
                button._needUrl = true;

            // Overriding some of the leaflet styles
            button.style.display = 'inline-block';
            button.style.border = 'none';
            button.style.borderRadius = '0 0 0 0';
            button.style.textAlign = 'center';
            this._buttons.push(button);
            },

            _update: function(center) {
            if (!center)
                return;
            var last;
            for (var i = 0; i < this._buttons.length; i++) {
                var b = this._buttons[i],
                    show = !b._bounds || b._bounds.contains(center),
                    vis = this._container.contains(b);

                if (show && !vis) {
                ref = last ? last.nextSibling : this._container.firstChild;
                this._container.insertBefore(b, ref);
                } else if (!show && vis) {
                this._container.removeChild(b);
                return;
                }
                last = b;

                var tmpl = b._template;
                tmpl = tmpl
                .replace(/{lon}/g, L.Util.formatNum(center.lng, 6))
                .replace(/{lat}/g, L.Util.formatNum(center.lat, 6));
                if (b._needUrl)
                b.href = tmpl;
                else
                b._href = tmpl;
            }
            },

            _ajaxRequest: function(url, callback, post_data) {
            if (window.XMLHttpRequest === undefined)
                return;
            var req = new XMLHttpRequest();
            req.open(post_data ? 'POST' : "GET", url);
            if (post_data)
                req.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
            req.onreadystatechange = function() {
                if (req.readyState === 4 && req.status == 200) {
                var data = (JSON.parse(req.responseText));
                callback(data);
                }
            };
            req.send(post_data);
            }
        });

        L.streetView = function(options) {
            return new L.StreetView(options);
        }

        // 'map' on Leaflet-kartan instanssi
        var streetViewControl = L.streetView({
            google: true,  // Ota käyttöön Google Street View
        }).addTo(map);

        var savedMapState = localStorage.getItem('mapState');             
        if (savedMapState) {           
            // Jos tallennettu tila löytyy, käytä sitä kartan tilana             
            map.setView(JSON.parse(savedMapState).center, JSON.parse(savedMapState).zoom);              
        }

        // Tallenna karttatila aina kun kartta päivitetään                 
        map.on('moveend', function() {                  
            var mapState = {             
                center: map.getCenter(),                 
                zoom: map.getZoom()                
            };                   
            localStorage.setItem('mapState', JSON.stringify(mapState));                  
        });

        var edellinenZoomTaso = map.getZoom(); // Alustetaan edellinen zoomaustaso

        map.on('zoomend', function() {
            var nykyinenZoomTaso = map.getZoom(); // Päivitetään nykyinen zoomaustaso

            // Tarkista, onko zoomaustaso siirtynyt alaspäin yli 16:n
            if (edellinenZoomTaso >= 16 && nykyinenZoomTaso < 16) {
                // Jos zoomaustaso on nyt alle 16 ja markerCluster on päällä, poista ja lisää se uudelleen
                if (map.hasLayer(markerCluster)) {
                    map.removeLayer(markerCluster);
                    map.addLayer(markerCluster);
                }
            }
            edellinenZoomTaso = nykyinenZoomTaso; // Päivitä edellinen zoomaustaso nykyiseksi
        });

        

</script>
