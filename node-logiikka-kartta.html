<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Node-Edge Layout (anonymisoitu)</title>
<style>
  :root {
    --bg: #f5f7fa;
    --panel: #ffffff;
    --text: #1f2937;
    --muted: #5f6b7a;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text); font-family: "Segoe UI", Tahoma, Arial, sans-serif; }
  .wrap { padding: 12px; max-width: 1500px; margin: 0 auto; }
  .top { display: flex; flex-wrap: wrap; gap: 10px 14px; align-items: center; margin-bottom: 8px; }
  .title { font-size: 14px; font-weight: 600; }
  .small { font-size: 12px; color: var(--muted); }
  .ctrl { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
  select, button, input { font-size: 12px; border: 1px solid #cfd8e3; border-radius: 6px; background: #fff; color: #334155; padding: 4px 8px; }
  button { cursor: pointer; }
  .info { font-size: 12px; color: var(--muted); margin-bottom: 8px; min-height: 16px; }
  .metric-info { font-size: 12px; color: #475569; margin-bottom: 8px; }
  .bar-wrap { display: inline-flex; align-items: center; gap: 6px; margin-left: 8px; }
  .bar { width: 140px; height: 10px; border-radius: 5px; border: 1px solid #cbd5e1; }
  .frame { width: 100%; height: 74vh; min-height: 560px; background: var(--panel); border: 1px solid #d3dde8; border-radius: 10px; overflow: hidden; }
  canvas { width: 100%; height: 100%; display: block; background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%); }
  .legend { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 8px; font-size: 12px; color: var(--muted); }
  .lg { display: inline-flex; align-items: center; gap: 6px; }
  .dot { width: 11px; height: 11px; border-radius: 50%; border: 1px solid #fff; box-shadow: 0 0 0 1px rgba(0,0,0,0.08); }
  .line { width: 18px; height: 2px; border-radius: 2px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="title">Node-edge layout (anonymisoitu sijainti, aidot etäisyydet ja reunapituudet)</div>
    <div class="ctrl">Väritys:
      <select id="colorMode">
        <option value="type">Solmutyyppi</option>
        <option value="linetype">Linjatyyppi</option>
        <option value="block">Lohko</option>
        <option value="fault">Vikavirta (Ik3)</option>
        <option value="drop">Jännitteenalenema</option>
      </select>
    </div>
    <div class="ctrl">Kuormitustapa:
      <select id="dropMode">
        <option value="norm">Normaali huipputeho</option>
        <option value="mw">1 MW jakorajalle</option>
      </select>
    </div>
    <div class="ctrl"><label><input type="checkbox" id="labelsToggle" checked> Näytä kuormasolmujen etäisyys</label></div>
    <div class="ctrl"><label><input type="checkbox" id="edgeLenToggle"> Näytä reunapituudet</label></div>
    <button id="fitBtn" type="button">Sovita</button>
    <div class="small">Hiiren rulla = zoom, vedä = pan</div>
  </div>

  <div class="metric-info" id="metricInfo"></div>
  <div class="info" id="info">Vie hiiri solmun tai johdon päälle.</div>
  <div class="frame"><canvas id="cv"></canvas></div>
  <div class="legend">
    <span class="lg"><span class="dot" style="background:#111827"></span>root</span>
    <span class="lg"><span class="dot" style="background:#ffffff; box-shadow:0 0 0 1px #111827"></span>junction</span>
    <span class="lg"><span class="dot" style="background:#ff7f0e"></span>load</span>
    <span class="lg"><span class="line" style="background:#1f77b4"></span>RUNKO</span>
    <span class="lg"><span class="line" style="background:#2ca02c"></span>HAARA</span>
  </div>
</div>

const NOM_KV = 20.0;

const nodeById = {};
for (const n of NODES) nodeById[n.id] = n;

const canvas = document.getElementById('cv');
const ctx = canvas.getContext('2d');
const info = document.getElementById('info');
const metricInfo = document.getElementById('metricInfo');
const colorMode = document.getElementById('colorMode');
const dropMode = document.getElementById('dropMode');
const labelsToggle = document.getElementById('labelsToggle');
const edgeLenToggle = document.getElementById('edgeLenToggle');
const fitBtn = document.getElementById('fitBtn');

const BLOCK_COLORS = {1:'#1f77b4', 2:'#2ca02c', 3:'#f59e0b', 4:'#ef4444'};
const TYPE_COLORS = {root:'#111827', junction:'#ffffff', load:'#ff7f0e'};
const LT_COLORS = {RUNKO:'#1f77b4', HAARA:'#2ca02c'};

const MAX_DIST_M = Math.max(...NODES.map(n => Number(n.dist) || 0), 1);

let scale = 1;
let offsetX = 0;
let offsetY = 0;
let dragging = false;
let dragStartX = 0;
let dragStartY = 0;
let startOffX = 0;
let startOffY = 0;

function resizeCanvas() {
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = Math.max(1, Math.floor(rect.width * dpr));
  canvas.height = Math.max(1, Math.floor(rect.height * dpr));
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

function toWorld(node) {
  const w = canvas.clientWidth || 1000;
  const h = canvas.clientHeight || 700;
  const marginLeft = 78;
  const marginRight = 28;
  const marginTop = 28;
  const marginBottom = 28;
  const x = marginLeft + node.x * (w - marginLeft - marginRight);
  const y = marginTop + node.y * (h - marginTop - marginBottom);
  return [x, y];
}

function worldToScreen(x, y) {
  return [x * scale + offsetX, y * scale + offsetY];
}

function screenToWorld(x, y) {
  return [(x - offsetX) / scale, (y - offsetY) / scale];
}

function clamp01(t) {
  return Math.max(0, Math.min(1, t));
}

function lerp(a, b, t) {
  return a + (b - a) * t;
}

function hexToRgb(h) {
  const s = h.replace('#', '');
  return [parseInt(s.slice(0,2), 16), parseInt(s.slice(2,4), 16), parseInt(s.slice(4,6), 16)];
}

function rgbToHex(r, g, b) {
  const c = (v) => Math.round(v).toString(16).padStart(2, '0');
  return `#${c(r)}${c(g)}${c(b)}`;
}

function gradientColor(t, scaleStops) {
  const tt = clamp01(t);
  for (let i = 0; i < scaleStops.length - 1; i++) {
    const a = scaleStops[i];
    const b = scaleStops[i + 1];
    if (tt >= a[0] && tt <= b[0]) {
      const k = (tt - a[0]) / Math.max(1e-9, b[0] - a[0]);
      const ra = hexToRgb(a[1]);
      const rb = hexToRgb(b[1]);
      return rgbToHex(lerp(ra[0], rb[0], k), lerp(ra[1], rb[1], k), lerp(ra[2], rb[2], k));
    }
  }
  return scaleStops[scaleStops.length - 1][1];
}

const FAULT_SCALE = [[0.0,'#2c7bb6'], [0.5,'#fee08b'], [1.0,'#d7191c']];
const DROP_SCALE  = [[0.0,'#1a9850'], [0.5,'#fee08b'], [1.0,'#d73027']];

function metricValue(node) {
  if (colorMode.value === 'fault') {
    return Number.isFinite(node.ik3) ? node.ik3 : null;
  }
  if (colorMode.value === 'drop') {
    const v = dropMode.value === 'mw' ? node.drop_mw_pct : node.drop_norm_pct;
    return Number.isFinite(v) ? v : null;
  }
  return null;
}

function metricStats() {
  const vals = NODES.map(metricValue).filter(v => Number.isFinite(v));
  if (!vals.length) return null;
  return { min: Math.min(...vals), max: Math.max(...vals) };
}

function metricColor(node) {
  const val = metricValue(node);
  const stats = metricStats();
  if (!Number.isFinite(val) || !stats || stats.max <= stats.min) return '#94a3b8';
  const t = (val - stats.min) / (stats.max - stats.min);
  return gradientColor(t, colorMode.value === 'fault' ? FAULT_SCALE : DROP_SCALE);
}

function edgeColor(e) {
  const mode = colorMode.value;
  if (mode === 'block') return BLOCK_COLORS[e.bl] || '#94a3b8';
  if (mode === 'linetype') return LT_COLORS[e.lt] || '#94a3b8';
  if (mode === 'fault' || mode === 'drop') {
    const n = nodeById[e.to] || nodeById[e.from];
    return n ? metricColor(n) : '#94a3b8';
  }
  return '#9aa7b5';
}

function nodeColor(n) {
  const mode = colorMode.value;
  if (mode === 'type') return TYPE_COLORS[n.type] || '#ffffff';
  if (mode === 'linetype') {
    const pe = EDGES.find(e => e.to === n.id);
    return LT_COLORS[pe?.lt] || '#ffffff';
  }
  if (mode === 'block') {
    const pe = EDGES.find(e => e.to === n.id);
    return BLOCK_COLORS[pe?.bl] || '#ffffff';
  }
  if (mode === 'fault' || mode === 'drop') {
    return metricColor(n);
  }
  return '#ffffff';
}

function updateMetricInfo() {
  const mode = colorMode.value;
  const stats = metricStats();

  if (mode === 'drop') {
    dropMode.disabled = false;
  } else {
    dropMode.disabled = true;
  }

  if (!stats || !(mode === 'fault' || mode === 'drop')) {
    metricInfo.textContent = '';
    return;
  }

  const unit = mode === 'fault' ? 'A' : '%';
  const label = mode === 'fault'
    ? 'Väritys: 3-vaiheinen vikavirta (Ik3)'
    : `Väritys: jännitteenalenema (${dropMode.value === 'mw' ? '1 MW jakorajalle' : 'normaali huipputeho'})`;

  const grad = mode === 'fault'
    ? 'linear-gradient(90deg,#2c7bb6 0%,#fee08b 50%,#d7191c 100%)'
    : 'linear-gradient(90deg,#1a9850 0%,#fee08b 50%,#d73027 100%)';

  metricInfo.innerHTML = `${label} · min ${stats.min.toFixed(2)} ${unit} · max ${stats.max.toFixed(2)} ${unit}` +
    ` <span class="bar-wrap"><span style="font-size:11px;color:#64748b">matala</span><span class="bar" style="background:${grad}"></span><span style="font-size:11px;color:#64748b">korkea</span></span>`;
}

function drawDistanceAxis() {
  const w = canvas.clientWidth;
  const h = canvas.clientHeight;
  const marginLeft = 78;
  const marginTop = 28;
  const marginBottom = 28;
  const y0 = marginTop;
  const y1 = h - marginBottom;

  ctx.save();
  ctx.strokeStyle = 'rgba(120, 134, 153, 0.55)';
  ctx.fillStyle = '#5f6b7a';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(marginLeft - 18, y0);
  ctx.lineTo(marginLeft - 18, y1);
  ctx.stroke();

  const stepKm = 2;
  const maxKm = MAX_DIST_M / 1000;
  for (let km = 0; km <= maxKm + 0.001; km += stepKm) {
    const d = km * 1000;
    const t = d / MAX_DIST_M;
    const y = y0 + t * (y1 - y0);
    ctx.beginPath();
    ctx.moveTo(marginLeft - 22, y);
    ctx.lineTo(marginLeft - 14, y);
    ctx.stroke();
    ctx.font = '11px Segoe UI, sans-serif';
    ctx.fillText(`${km.toFixed(0)} km`, 8, y + 3);
  }
  ctx.restore();
}

function draw() {
  const w = canvas.clientWidth;
  const h = canvas.clientHeight;
  ctx.clearRect(0, 0, w, h);

  updateMetricInfo();
  drawDistanceAxis();

  for (const e of EDGES) {
    const a = nodeById[e.from];
    const b = nodeById[e.to];
    if (!a || !b) continue;

    const [ax, ay] = worldToScreen(...toWorld(a));
    const [bx, by] = worldToScreen(...toWorld(b));

    ctx.beginPath();
    ctx.moveTo(ax, ay);
    ctx.lineTo(bx, by);
    ctx.strokeStyle = edgeColor(e);
    ctx.lineWidth = e.lt === 'RUNKO' ? 2.2 : 1.2;
    ctx.globalAlpha = 0.88;
    ctx.stroke();
    ctx.globalAlpha = 1;

    if (edgeLenToggle.checked && e.len_m >= 250) {
      const mx = (ax + bx) / 2;
      const my = (ay + by) / 2;
      ctx.fillStyle = '#475569';
      ctx.font = '10px Segoe UI, sans-serif';
      ctx.fillText(`${Math.round(e.len_m)} m`, mx + 3, my - 3);
    }
  }

  const showLabels = labelsToggle.checked;
  for (const n of NODES) {
    const [sx, sy] = worldToScreen(...toWorld(n));
    const r = n.type === 'root' ? 4.6 : (n.type === 'load' ? 3.9 : 2.5);
    const fill = nodeColor(n);

    ctx.beginPath();
    ctx.arc(sx, sy, r, 0, Math.PI * 2);
    ctx.fillStyle = fill;
    ctx.fill();
    ctx.strokeStyle = '#111827';
    ctx.lineWidth = n.type === 'junction' ? 0.8 : 1.1;
    ctx.stroke();

    if (showLabels && (n.type === 'load' || n.type === 'root')) {
      ctx.fillStyle = '#1f2937';
      ctx.font = '11px Segoe UI, sans-serif';
      const distKm = (Number(n.dist || 0) / 1000).toFixed(2);
      ctx.fillText(`${n.id} (${distKm} km)`, sx + 6, sy - 4);
    }
  }
}

function fitView() {
  const pts = NODES.map(n => toWorld(n));
  const xs = pts.map(p => p[0]);
  const ys = pts.map(p => p[1]);
  const minX = Math.min(...xs), maxX = Math.max(...xs);
  const minY = Math.min(...ys), maxY = Math.max(...ys);

  const pad = 24;
  const w = canvas.clientWidth || 1000;
  const h = canvas.clientHeight || 700;
  const sx = (w - pad * 2) / Math.max(1, maxX - minX);
  const sy = (h - pad * 2) / Math.max(1, maxY - minY);
  scale = Math.min(sx, sy);
  offsetX = pad - minX * scale;
  offsetY = pad - minY * scale;
  draw();
}

function nearestAt(screenX, screenY) {
  const [wx, wy] = screenToWorld(screenX, screenY);

  let bestNode = null;
  let bestNodeD = 8;
  for (const n of NODES) {
    const [nx, ny] = toWorld(n);
    const d = Math.hypot((nx - wx) * scale, (ny - wy) * scale);
    if (d < bestNodeD) { bestNodeD = d; bestNode = n; }
  }
  if (bestNode) return { node: bestNode };

  let bestEdge = null;
  let bestEdgeD = 6;
  for (const e of EDGES) {
    const a = nodeById[e.from], b = nodeById[e.to];
    if (!a || !b) continue;
    const [x1, y1] = toWorld(a), [x2, y2] = toWorld(b);
    const dx = x2 - x1, dy = y2 - y1;
    const l2 = dx * dx + dy * dy;
    if (!l2) continue;
    const t = Math.max(0, Math.min(1, ((wx - x1) * dx + (wy - y1) * dy) / l2));
    const px = x1 + t * dx, py = y1 + t * dy;
    const d = Math.hypot((wx - px) * scale, (wy - py) * scale);
    if (d < bestEdgeD) { bestEdgeD = d; bestEdge = e; }
  }
  if (bestEdge) return { edge: bestEdge };
  return null;
}

canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.14 : 0.88;
  const [wx, wy] = screenToWorld(e.offsetX, e.offsetY);
  scale *= factor;
  offsetX = e.offsetX - wx * scale;
  offsetY = e.offsetY - wy * scale;
  draw();
}, { passive: false });

canvas.addEventListener('mousedown', (e) => {
  dragging = true;
  dragStartX = e.offsetX;
  dragStartY = e.offsetY;
  startOffX = offsetX;
  startOffY = offsetY;
});

window.addEventListener('mouseup', () => { dragging = false; });

canvas.addEventListener('mousemove', (e) => {
  if (dragging) {
    offsetX = startOffX + (e.offsetX - dragStartX);
    offsetY = startOffY + (e.offsetY - dragStartY);
    draw();
    return;
  }

  const hit = nearestAt(e.offsetX, e.offsetY);
  if (!hit) {
    info.textContent = 'Vie hiiri solmun tai johdon päälle.';
    return;
  }
  if (hit.node) {
    const n = hit.node;
    const uNormTxt = Number.isFinite(n.u_norm) ? `${n.u_norm.toFixed(4)} kV` : '-';
    const uMwTxt = Number.isFinite(n.u_mw) ? `${n.u_mw.toFixed(4)} kV` : '-';
    const ik3Txt = Number.isFinite(n.ik3) ? `${n.ik3.toFixed(1)} A` : '-';
    info.textContent = `${n.id} · ${n.type} · etäisyys ${Math.round(n.dist || 0)} m · Ik3 ${ik3Txt} · U norm ${uNormTxt} · U 1MW ${uMwTxt}`;
    return;
  }
  const e2 = hit.edge;
  const child = nodeById[e2.to];
  const ik3Txt = child && Number.isFinite(child.ik3) ? `${child.ik3.toFixed(1)} A` : '-';
  const dropTxt = child
    ? (dropMode.value === 'mw'
      ? (Number.isFinite(child.drop_mw_pct) ? `${child.drop_mw_pct.toFixed(3)} %` : '-')
      : (Number.isFinite(child.drop_norm_pct) ? `${child.drop_norm_pct.toFixed(3)} %` : '-'))
    : '-';
  info.textContent = `${e2.id} · ${e2.lt || '-'} · ${e2.cond || '-'} · lohko ${e2.bl ?? '-'} · pituus ${Math.round(e2.len_m || 0)} m · Ik3 ${ik3Txt} · ΔU ${dropTxt}`;
});

colorMode.addEventListener('change', draw);
dropMode.addEventListener('change', draw);
labelsToggle.addEventListener('change', draw);
edgeLenToggle.addEventListener('change', draw);
fitBtn.addEventListener('click', fitView);
window.addEventListener('resize', () => { resizeCanvas(); fitView(); });

resizeCanvas();
fitView();
</script>
</body>
</html>
